services:
  # Static demo app server (pews-chart) using live-server
  demo:
    image: node:alpine
    working_dir: /app
    command: sh -c "npm install -g live-server && live-server --port=8000 --host=0.0.0.0 --no-browser"
    ports:
      - "8000:8000"
    volumes:
      - ./pews-chart:/app
    container_name: digital-pews-demo
    restart: unless-stopped
