<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NPEWS Chart - Demonstration</title>
  <!--
    Lato is used as the closest freely available substitute for Frutiger.
    Implementers with a Frutiger license can remove this <link> and override
    the --font CSS variable in their own stylesheet instead:
      :root { --font: 'Frutiger', 'Frutiger LT Std', Lato, sans-serif; }
  -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="demo.css" />
</head>
<!-- data-layout is set by chart.js on load (landscape | portrait | mobile) -->
<body class="demo">

  <div class="demo-shell">

    <!-- Scenario picker: the "stories" that used to live in Storybook -->
    <aside class="demo-sidebar" aria-label="Demonstration scenarios">
      <div class="demo-sidebar__brand">
        <h1 class="demo-sidebar__title">Digital PEWS</h1>
        <p class="demo-sidebar__subtitle">
          Open-source NHS National Paediatric Early Warning System chart
        </p>
      </div>

      <h2 class="demo-sidebar__heading">Example patients</h2>
      <ul class="scenario-list" id="scenario-list" role="tablist"></ul>

      <p class="demo-sidebar__foot">
        Scores, escalation levels and the applicable age band are computed from
        each patient's date of birth and raw vital signs &mdash; never hand-typed.
      </p>
    </aside>

    <!-- The chart component mounts here. It knows nothing about the sidebar. -->
    <div class="demo-main" id="chart-host"></div>

  </div>

  <!-- The harness is the entry point; it imports the chart engine and the
       scenario catalogue and drives them. No demo-data.js window globals here:
       every scenario is passed to the chart explicitly as props. -->
  <script type="module" src="demo.js"></script>
</body>
</html>
