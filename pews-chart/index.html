<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NPEWS Chart</title>
</head>
<!-- data-layout: landscape | portrait | mobile (set by JS on load, overridable by user)  -->
<!-- data-lock-layout: present to disable the user toggle in production deployments       -->
<body>

<!-- Standalone single chart, rendered by the <npews-chart> Web Component. The
     element is a genuine drop-in: it self-provisions its own stylesheet and font
     (relative to npews-chart.js) so this page needs no <link> tags of its own. -->
<npews-chart id="chart"></npews-chart>

<!-- Register the element, then feed it a JSON object. demo-data.js publishes
     window.PATIENT / window.OBSERVATIONS (raw vitals only - scores are computed). -->
<script type="module" src="npews-chart.js"></script>
<script type="module" src="demo-data.js"></script>
<script type="module">
  document.getElementById('chart').data = {
    patient: window.PATIENT,
    observations: window.OBSERVATIONS,
  };
</script>
</body>
</html>
